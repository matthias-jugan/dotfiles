[window]

# opacity = 0.7
blur = true

padding.x = 10
padding.y = 10

decorations = "Full"
startup_mode = "Maximized"

dynamic_title = false

[font]

normal = { family = "IosevkaTerm Nerd Font", style = "Regular" }
bold = { family = "IosevkaTerm Nerd Font", style = "Bold" }
italic = { family = "IosevkaTerm Nerd Font", style = "Italic" }
bold_italic = { family = "IosevkaTerm Nerd Font", style = "Bold Italic" }
# normal = { family = "ZedMono Nerd Font", style = "Regular" }
# bold = { family = "ZedMono Nerd Font", style = "Bold" }
# italic = { family = "ZedMono Nerd Font", style = "Italic" }
# bold_italic = { family = "ZedMono Nerd Font", style = "Bold Italic" }
size = 12.0

[scrolling]

history = 100000

[terminal]

shell = { program = "zsh" }

[env]

STARTUP_TMUX = "1"
